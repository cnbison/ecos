name: ECOS Test Suite

# v0.55.0-e: CI 自动化 (防御性自检 + pytest)
#
# 触发条件:
#   - push 到 main 分支
#   - pull request 到 main 分支
#   - 手动触发 (workflow_dispatch)
#
# 拦截目标:
#   - silent pass 提交 (防御性自检 #1)
#   - 版本号漏 bump (防御性自检 #2)
#   - detect_with_hits 不传 library_str (防御性自检 #3)
#   - HTML class 与 CSS 错配 (防御性自检 #4)
#   - DB 恢复字段漏 (防御性自检 #5)
#   - pytest 任何失败 (partial credit / 双层架构 / 跨学科迁移)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run defensive checks (5 项)
        run: bash scripts/check_defensive.sh

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
