<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOS 学生端</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.5 system-ui, sans-serif; background: #f5f5f5; color: #222; }
a { color: #2563eb; }

/* 容器 */
.wrap { max-width: 800px; margin: 0 auto; padding: 0 12px; }

/* 顶栏 */
.topbar { background: #1e40af; color: #fff; padding: 8px 0; margin-bottom: 12px; }
.topbar .wrap { display: flex; align-items: center; gap: 16px; }
.topbar h1 { font-size: 15px; font-weight: 600; }

/* W5+ (2026-07-18): 版本号 + 当前学生 ID */
.version {
  font-size: 10px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  font-weight: 400;
  font-family: monospace;
  vertical-align: middle;
  cursor: help;
}
.topbar-sid {
  font-size: 11px;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 500;
  cursor: help;
  font-family: monospace;
}
.topbar .kpi { display: flex; gap: 16px; font-size: 12px; }
.topbar .kpi span { opacity: 0.85; }

/* 面板 */
.card { background: #fff; border-radius: 8px; margin-bottom: 8px; }
.ch { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; display: flex; gap: 6px; align-items: center; }
.ch .t { font-size: 11px; background: #f3f4f6; color: #666; padding: 1px 7px; border-radius: 20px; }
.ch .t.blue { background: #dbeafe; color: #1e40af; }
.ch .t.green { background: #dcfce7; color: #166534; }

/* 5D 网格 */
.dim-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 10px; }
.dim { background: #fff; border-radius: 6px; padding: 8px 6px; text-align: center; }
.dim .lbl { font-size: 13px; font-weight: 700; color: #1e40af; text-transform: uppercase; }
.dim .cn { font-size: 10px; color: #888; }
.dim .theta { font-size: 18px; font-weight: 700; color: #1e40af; margin: 2px 0; }
.dim .bar { height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
.dim .bar div { height: 100%; background: #2563eb; border-radius: 2px; }
.dim .conf-label { font-size: 9px; color: #aaa; margin-top: 3px; }
.dim .conf-bar { height: 3px; background: #dbe4f5; border-radius: 2px; overflow: hidden; }
.dim .conf-bar div { height: 100%; background: #8b5cf6; border-radius: 2px; }

/* v0.48.2: 5D 头部(K + 概念理解)合并到一行(Bisen 反馈"两行太占地方")
   之前 .lbl / .cn 是两个独立 div 垂直堆叠,改成 .dim-head flex 容器一行显示 */
.dim-head { display: flex; align-items: baseline; justify-content: center; gap: 4px; margin-bottom: 2px; }
.dim-head .lbl { font-size: 14px; font-weight: 700; color: #1e40af; }

/* Bloom + 右侧面板 两栏 */
.state-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.state-row .card { margin-bottom: 0; }

/* Bloom */
.bloom-rows { padding: 6px 10px; }
/* v0.48.2: Bisen 反馈 L2-L6 排版错位成 3 行(L2 / 理 / 解)
   根因: .br 第一个子元素是 span 包含 "L2 理解",span 宽度 36px
   装不下 "L2 理解" 3 字符就逐字换行(中文字符宽度计算异常)
   修法: 拆成 .b-lbl(L2) + .b-name(理解) 两个 span,各自固定宽度
   也兼容之前 inline span + .fill + .pct 的结构(class 复用) */
.br { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.br .b-lbl { width: 22px; font-size: 11px; color: #6b7280; font-weight: 500; text-align: left; flex-shrink: 0; }
.br .b-name { width: 24px; font-size: 11px; color: #6b7280; font-weight: 500; text-align: left; flex-shrink: 0; }
.br .fill { flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
.br .fill div { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.3s; }
.br .pct { width: 30px; text-align: right; font-size: 10px; color: #9ca3af; flex-shrink: 0; }

/* TC 状态 */
.tc-rows { padding: 6px 10px; }
.tc-r { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 11px; }
.tc-r .tc-id { font-weight: 600; color: #92400e; min-width: 30px; }
.tc-r .tc-status { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
.tc-r .tc-status.pre { background: #f3f4f6; color: #6b7280; }
.tc-r .tc-status.liminal { background: #fef3c7; color: #92400e; }
.tc-r .tc-status.post { background: #dcfce7; color: #166534; }
.tc-r .tc-progress { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.tc-r .tc-progress div { height: 100%; background: #f59e0b; border-radius: 3px; transition: width 0.3s; }
.tc-r .tc-pct { font-size: 10px; color: #9ca3af; width: 28px; text-align: right; }

/* LearningDNA */
.ldn-row { padding: 6px 10px; font-size: 11px; color: #6b7280; }
.ldn-row div { margin-bottom: 3px; }
.ldn-row strong { color: #374151; }

/* Trajectory */
.traj-list { padding: 6px 10px; max-height: 240px; overflow-y: auto; font-size: 11px; }
/* v0.49.0: 成长轨迹折叠按钮（复用 .report-toggle 风格,放行内右对齐） */
.traj-toggle {
  margin-left: auto;
  background: #f3f4f6;
  color: #4b5563;
  border: 1px solid #e5e7eb;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s ease;
}
.traj-toggle:hover { background: #e5e7eb; }
.traj-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; padding: 3px 6px; background: #f9fafb; border-radius: 4px; }
.traj-item .t-num { color: #9ca3af; font-size: 10px; min-width: 20px; }
.traj-item .t-k, .traj-item .t-p, .traj-item .t-s { font-family: monospace; font-size: 10px; }
.traj-item .t-k { color: #1e40af; }
.traj-item .t-p { color: #7c3aed; }
.traj-item .t-s { color: #059669; }

/* Misc 历史 */
.misc-list { padding: 6px 10px; font-size: 11px; }
.misc-badge { display: inline-block; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; margin: 2px 4px 2px 0; }

/* 题目 */
.prob { padding: 12px; font-family: monospace; font-size: 13px; white-space: pre-wrap; line-height: 1.6; min-height: 52px; }

/* 输入 */
.ta { width: 100%; min-height: 80px; padding: 10px 12px; border: none; border-bottom: 1px solid #eee; font: 13px monospace; resize: vertical; outline: none; }
.btns { display: flex; gap: 6px; padding: 8px 10px; }
button { flex: 1; padding: 8px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
button:hover { background: #1d4ed8; }
button.g { background: #16a34a; }
button.g:hover { background: #15803d; }
button:disabled { opacity: 0.5; cursor: default; }

/* 反馈 */
.fb { padding: 10px 12px; font-size: 13px; }
.fb.ok { color: #16a34a; font-weight: 600; }
.fb.err { color: #dc2626; font-weight: 600; }
.fb .meta { margin-top: 4px; font-size: 11px; color: #888; font-family: monospace; }
.fb .misc { color: #d97706; font-size: 12px; margin-top: 3px; }

/* 干预 */
.iv { background: #fffbeb; border-radius: 8px; margin-bottom: 8px; }
.iv .ch { background: #fef3c7; border-color: #fde68a; color: #92400e; }
.iv .bd { padding: 10px 12px; font-size: 13px; color: #78350f; line-height: 1.7; }
.iv .lbl { display: inline-block; background: #fef3c7; border: 1px solid #fde68a; color: #92400e; font-size: 11px; font-weight: 600; padding: 0 6px; border-radius: 4px; margin-right: 4px; }

/* 登录 */
.login { max-width: 360px; margin: 80px auto; text-align: center; }
.login h2 { font-size: 18px; margin-bottom: 16px; color: #1e40af; }
.login input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
.login button { width: 100%; margin-top: 4px; }

/* W1 (2026-07-17): Bloom 距下一层副标题 + warm-up 灰色样式 */
.bloom-delta {
  display: inline-block;
  margin-left: 4px;
  font-size: 11px;
  font-weight: 500;
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.15);
  padding: 1px 6px;
  border-radius: 8px;
}
.bloom-delta.positive { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
.bloom-delta.negative { color: #f87171; background: rgba(248, 113, 113, 0.15); }

.warmup-pill {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  cursor: help;
  transition: opacity 0.3s ease;
}
.warmup-pill.fadeout { opacity: 0; }

.is-warmup {
  color: #999 !important;
  opacity: 0.6;
  transition: color 0.3s ease, opacity 0.3s ease;
}
.is-warmup-fadeout {
  color: inherit !important;
  opacity: 1;
}

/* W3+ (2026-07-17): 导出报告按钮（C 端接口） */
.export-btn {
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.4);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  margin-left: auto;
  transition: background 0.2s ease;
}
.export-btn:hover { background: rgba(255, 255, 255, 0.3); }
.export-btn:disabled { opacity: 0.5; cursor: default; }

/* W4 (2026-07-17): Bloom 未探测层视觉 */
.br.unprobed { opacity: 0.5; }
.br.unprobed .pct { color: #9ca3af; font-style: italic; }
.unprobed-bar {
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(90deg, #e5e7eb 0, #e5e7eb 4px, transparent 4px, transparent 8px);
  border-radius: 4px;
}

/* W4 (2026-07-17): TC progress 颜色分级 */
.tc-low { background: #d1d5db; }    /* < 0.3 灰 */
.tc-mid { background: #f59e0b; }    /* 0.3-0.7 黄 */
.tc-high { background: #10b981; }   /* > 0.7 绿 */

/* W5 (2026-07-18): 最近学生列表 */
.recent-list {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #e5e7eb;
  text-align: left;
}
.recent-label {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 6px;
}
#recent-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.recent-btn {
  background: #f3f4f6;
  color: #374151;
  border: 1px solid #d1d5db;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 400;
  cursor: pointer;
  flex: 0 0 auto;
}
.recent-btn:hover { background: #e5e7eb; }
.recent-btn.selected {
  background: #2563eb;
  color: #fff;
  border-color: #1d4ed8;
}
.recent-btn.selected:hover { background: #1d4ed8; }
.clear-recent {
  background: transparent;
  color: #9ca3af;
  border: none;
  font-size: 11px;
  cursor: pointer;
  padding: 4px 0;
}
.clear-recent:hover { color: #ef4444; }

/* W5+ (2026-07-19): 个人学习画像面板（C 端 A 端,纯前端渲染 interpretation）
   注：本项目 CSS 全部内联在此 <style> 块,styles.css 是孤儿文件,无 link 引用。
   v0.47.3 修复:0.47.2 把样式写到 styles.css 但 HTML 没引用,导致浏览器只看到 inline 旧版样式,
   折叠面板退化成纯文本。 */
.report-card .ch { display: flex; align-items: center; gap: 6px; }
.report-toggle {
  margin-left: auto;
  background: #f3f4f6;
  color: #4b5563;
  border: 1px solid #e5e7eb;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s ease;
}
.report-toggle:hover { background: #e5e7eb; }
.report-body { padding: 8px 12px; font-size: 12px; line-height: 1.6; color: #1f2937; }
.report-loading { color: #9ca3af; text-align: center; padding: 12px; }
.report-section { margin-bottom: 12px; }
.report-section:last-child { margin-bottom: 0; }
.report-section-title {
  font-size: 11px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  padding-bottom: 2px;
  border-bottom: 1px solid #e5e7eb;
}
.report-overall {
  background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
  border-left: 3px solid #8b5cf6;
  padding: 8px 10px;
  border-radius: 4px;
  color: #1e40af;
  font-weight: 500;
}
.report-5d-row {
  display: grid;
  grid-template-columns: 60px 50px 1fr;
  gap: 8px;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.report-5d-name { font-weight: 600; color: #374151; }
.report-5d-val { font-family: monospace; color: #6b7280; font-size: 11px; }
.report-5d-comment { color: #4b5563; }
.report-tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}
.report-tag.strong { background: #dcfce7; color: #166534; }
.report-tag.medium { background: #fef3c7; color: #92400e; }
.report-tag.weak { background: #fee2e2; color: #991b1b; }
.report-tag.progressing { background: #fef3c7; color: #92400e; }
.report-tag.approaching { background: #dcfce7; color: #166534; }
.report-tag.untouched { background: #f3f4f6; color: #6b7280; }
.report-bloom-meta { color: #6b7280; font-size: 11px; margin-bottom: 4px; }
.report-tc-row {
  display: grid;
  grid-template-columns: 1fr 60px 70px;
  gap: 8px;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}
.report-tc-name { font-family: monospace; color: #374151; }
.report-tc-prog { font-family: monospace; color: #6b7280; font-size: 11px; text-align: right; }
.report-traj-delta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 4px 0;
  font-size: 11px;
}
.report-delta-chip {
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: monospace;
}
.report-delta-chip.up { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
.report-delta-chip.down { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
.report-steps {
  list-style: none;
  counter-reset: step;
  padding: 0;
}
.report-steps li {
  counter-increment: step;
  padding: 4px 0 4px 28px;
  position: relative;
  color: #374151;
}
.report-steps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 4px;
  width: 20px;
  height: 20px;
  background: #8b5cf6;
  color: #fff;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}
.report-comment {
  color: #4b5563;
  font-size: 12px;
  padding: 4px 0;
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar" id="topbar" style="display:none;">
  <div class="wrap">
    <h1>ECOS Python 基础</h1>
    <div class="kpi">
      <span id="kb-wrap">
        Bloom: <span id="kb">—</span>
        <span class="bloom-delta" id="kdelta" style="display:none;"></span>
      </span>
      <span id="kov">总置信度: —</span>
      <span id="warmup-pill" class="warmup-pill" style="display:none;" title="我们还在熟悉你的节奏，状态估计置信度较低">🌱 正在熟悉你的节奏</span>
      <span class="topbar-sid" title="当前学生 ID">👤 <span id="current-sid">—</span></span>
      <button id="export-btn" class="export-btn" onclick="exportReport()" title="导出当前学习状态为 JSON 文件（C 端接口,可发给家长/教师）">📊 导出报告</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- 登录 -->
  <div class="login" id="login">
    <h2>ECOS Python 基础</h2>
    <input type="text" id="sid" placeholder="加载最近学生中…" disabled>
    <button onclick="start()">进入学习</button>
    <div id="recent-students" class="recent-list" style="display:none;">
      <div class="recent-label">📚 最近学生（点击快速选择）</div>
      <div id="recent-buttons"></div>
      <button class="clear-recent" onclick="clearLastSid()">🗑 清除浏览器记住的 ID</button>
    </div>
  </div>

  <!-- 学习区 -->
  <div id="study" style="display:none;">

    <!-- 5D 状态 + overall_confidence -->
    <div class="dim-grid" id="dimGrid">
      <!-- JS 动态渲染 -->
    </div>

    <!-- 右侧面板（Bloom + TC + LearningDNA + Trajectory + Misc）-->
    <div class="state-row">
      <!-- 左：Blooom -->
      <div class="card">
        <div class="ch">Bloom Profile <span class="t" id="bdom">—</span></div>
        <div class="bloom-rows" id="bloomRows">
          <!-- JS 动态渲染 L1-L6 -->
        </div>
      </div>
      <!-- 右：TC + LearningDNA -->
      <div class="card">
        <div class="ch">TC 状态 <span class="t blue">阈值概念</span></div>
        <div class="tc-rows" id="tcRows">
          <!-- JS 动态渲染 -->
        </div>
        <div class="ch" style="border-top:1px solid #eee; background:#f9fafb;">LearningDNA</div>
        <div class="ldn-row" id="ldnRow">
          <!-- JS 动态渲染 -->
        </div>
      </div>
    </div>

    <!-- Trajectory 历史 (v0.49.0: 默认折叠,12 条 timeline 占空间大,按需展开) -->
    <div class="card" id="trajCard" style="display:none;">
      <div class="ch">
        成长轨迹 <span class="t" id="trajN">0</span> 条
        <button class="traj-toggle" id="trajToggle" onclick="toggleTraj()">展开 ↓</button>
      </div>
      <div class="traj-list" id="trajList" style="display:none;">
        <!-- JS 动态渲染 -->
      </div>
    </div>

    <!-- Misconceptions 历史 -->
    <div class="card" id="miscCard" style="display:none;">
      <div class="ch">误概念历史 <span class="t" id="miscN">0</span></div>
      <div class="misc-list" id="miscList">
        <!-- JS 动态渲染 -->
      </div>
    </div>

    <!-- W5+ (2026-07-19): 个人学习画像（C 端 A 端,纯前端渲染后端 interpretation 字段） -->
    <div class="card report-card" id="reportCard" style="display:none;">
      <div class="ch">
        📋 个人学习画像
        <span class="t" id="reportStamp">—</span>
        <button class="report-toggle" id="reportToggle" onclick="toggleReport()">展开 ↓</button>
      </div>
      <div class="report-body" id="reportBody" style="display:none;">
        <!-- JS 动态渲染 6 段：overall / five_d / bloom / tc / trajectory / next_steps -->
        <div class="report-loading" id="reportLoading">加载中…</div>
      </div>
    </div>

    <!-- 题目 + 答题(v0.48.9 合并:答题是主路径,埋在 dashboard 下面违反用户动线) -->
    <div class="card">
      <div class="ch">当前题目 <span class="t" id="qid"></span> <span class="t blue" id="qtopic"></span> <span class="t green" id="qbloom"></span></div>
      <div class="prob" id="qtext">—</div>
      <textarea class="ta" id="ans" placeholder="输入代码或答案..."></textarea>
      <div class="btns">
        <button id="btnSub" onclick="submit()">提交答案</button>
        <button id="btnNext" class="g" onclick="nextQ()" style="display:none;">下一题 →</button>
      </div>
    </div>

    <!-- 反馈 -->
    <div class="card" id="fbox" style="display:none;">
      <div class="ch">反馈</div>
      <div class="fb" id="fbres"></div>
    </div>

    <!-- 干预 -->
    <div class="iv" id="ivbox" style="display:none;">
      <div class="ch" id="ivtype"></div>
      <div class="bd" id="ivbd"></div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:5173/api';
let sid = '', q = null;

// 页面加载时,自动填 localStorage 里的 sid + 加载最近学生列表
initLogin();
// v0.48.8: 删 loadEcosVersion() 调用(函数本体已删)

const DIMS = [
  {k:'K', label:'概念理解', color:'#1e40af'},
  {k:'P', label:'程序知识', color:'#7c3aed'},
  {k:'S', label:'策略知识', color:'#059669'},
  {k:'C', label:'元认知',   color:'#d97706'},
  {k:'X', label:'跨域迁移', color:'#dc2626'},
];

async function start() {
  sid = document.getElementById('sid').value.trim() || 'python_student_001';
  // 记住 sid 到 localStorage（W4 改进：避免重启后忘记 ID）
  try { localStorage.setItem('ecos_last_sid', sid); } catch(e) {}
  // W5+: topbar 显示当前学生 ID
  document.getElementById('current-sid').innerText = sid;
  document.getElementById('login').style.display = 'none';
  document.getElementById('topbar').style.display = 'block';
  // 0.47.7: 改 async + await,先 fetch state/question 再显示 study
  //   修复 race condition(Bisen 反馈"重新登录刚开始 5D/Bloom/TC 区域空白,刷新才好")
  //   根因:之前 study.style.display='block' 同步执行,refresh() 还没返回,
  //         用户先看到的是 5D/Bloom/TC 区域未渲染的初始 HTML 注释
  //   修复:Promise.all 并行 fetch state + question,完成后再显示 study
  //   副作用:fetch 慢时用户卡在 login 区——加 loading 文字提示
  const loginBtn = document.querySelector('.form-row button');
  const origBtnText = loginBtn ? loginBtn.innerText : null;
  if (loginBtn) {
    loginBtn.disabled = true;
    loginBtn.innerText = '加载中…';
  }
  try {
    // v0.48.4: 加 5s timeout 保护 + fetch 失败不 display study
    //   Bisen 反馈 0.47.7 修过同款 race condition,但偶尔还出现"5D 空白 + 总置信度 0.000"
    //   根因 1: Flask 冷启动时 /api/state 慢,Promise.all 一直 await
    //   根因 2: refresh() 之前 try/catch 包裹整个函数,fetch 失败被静默吞掉
    //           → start() 以为成功了 → display:block → 但 d=undefined → 5D 显示初始 innerText
    //   修复: 5s 超时 + refresh() 重构(fetch 阶段让 promise reject)
    //         start() 收到 reject/timeout → 不 display study,提示用户刷新
    const timeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('加载超时(5s) — 后端 /api/state 可能冷启动')), 5000)
    );
    await Promise.race([Promise.all([refresh(), loadQ()]), timeout]);
  } catch (e) {
    console.warn('start() fetch 失败/超时:', e);
    // v0.48.4: fetch 失败**不** display study,显示错误占位让用户刷新
    alert('数据加载失败:\n' + e.message + '\n\n请刷新浏览器重试。');
    const study = document.getElementById('study');
    study.innerHTML = '<div class="card" style="text-align:center;color:#ef4444;padding:24px;">❌ 数据加载失败<br><small style="color:#9ca3af;">' + e.message + '</small><br><br><button onclick="location.reload()" style="padding:6px 16px;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;">刷新页面</button></div>';
    if (loginBtn) {
      loginBtn.disabled = false;
      if (origBtnText !== null) loginBtn.innerText = origBtnText;
    }
    return;  // 不 display:block,让 study 保持 display:none(用户看到 login + alert)
  }
  if (loginBtn) {
    loginBtn.disabled = false;
    if (origBtnText !== null) loginBtn.innerText = origBtnText;
  }
  document.getElementById('study').style.display = 'block';
}

function clearLastSid() {
  try { localStorage.removeItem('ecos_last_sid'); } catch(e) {}
  alert('已清除浏览器记住的 ID');
}

// v0.48.8: 删 loadEcosVersion (v0.48.7 commit 把顶栏的版本号显示移除了)
//   函数本身被 0.46.4 commit 加进来用,现在不需要单独拉版本号了
//   保留 API /api/version(其他调试用),仅删这个 JS helper

function clearLastSid() {
  try { localStorage.removeItem('ecos_last_sid'); } catch(e) {}
  alert('已清除浏览器记住的 ID');
}

// 页面加载时,自动填 localStorage 里的 sid + 加载最近学生列表
function initLogin() {
  loadRecentStudents();
}

async function loadRecentStudents() {
  try {
    const r = await fetch(API + '/students/recent');
    const input = document.getElementById('sid');
    if (!r.ok) { input.disabled = false; return; }
    const data = await r.json();
    const list = data.students || [];
    if (list.length === 0) {
      // DB 无最近学生,保留默认 placeholder
      input.value = '';
      input.placeholder = '请输入学生 ID';
      input.disabled = false;
      return;
    }
    const container = document.getElementById('recent-students');
    const btns = document.getElementById('recent-buttons');
    let html = '';
    for (const s of list) {
      const safeS = s.replace(/'/g, "\\'");
      html += `<button class="recent-btn" data-sid="${s}" onclick="selectRecent('${safeS}', this)">${s}</button>`;
    }
    btns.innerHTML = html;
    container.style.display = 'block';
    // W5 改进：input 默认值 = localStorage 里的 lastSid;否则 = 最近学生第一个
    const lastSid = (() => { try { return localStorage.getItem('ecos_last_sid'); } catch(e) { return null; } })();
    if (lastSid && list.includes(lastSid)) {
      input.value = lastSid;
      // 高亮对应的按钮
      const btn = btns.querySelector(`[data-sid="${lastSid}"]`);
      if (btn) btn.classList.add('selected');
    } else {
      // 默认选第一个最近学生
      input.value = list[0];
      const firstBtn = btns.querySelector(`[data-sid="${list[0]}"]`);
      if (firstBtn) firstBtn.classList.add('selected');
    }
    input.placeholder = '或输入新学生 ID';
    input.disabled = false;  // 关键：加载完成后启用 input
  } catch(e) {
    console.warn('recent students:', e.message);
    document.getElementById('sid').disabled = false;  // 出错也要启用
  }
}

function selectRecent(sid, btn) {
  document.getElementById('sid').value = sid;
  // 高亮选中的按钮
  document.querySelectorAll('.recent-btn').forEach(b => b.classList.remove('selected'));
  if (btn) btn.classList.add('selected');
}

async function loadQ() {
  try {
    const r = await fetch(API + '/question/' + sid);
    const d = await r.json();
    if (d.done) {
      document.getElementById('qtext').innerHTML = '<b style="color:#16a34a">🎉 全部完成！</b>';
      return;
    }
    q = d;
    const h = v => String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    document.getElementById('qtext').innerHTML = h(d.problem_text).replace(/\n/g,'<br>');
    document.getElementById('qid').innerText = d.problem_id;
    document.getElementById('qtopic').innerText = d.skill_name;
    document.getElementById('qbloom').innerText = d.bloom_layer;
    document.getElementById('ans').value = '';
    document.getElementById('fbox').style.display = 'none';
    document.getElementById('ivbox').style.display = 'none';
    document.getElementById('btnSub').style.display = '';
    document.getElementById('btnNext').style.display = 'none';
  } catch(e) { alert(e.message); }
}

async function submit() {
  if (!q) return;
  const a = document.getElementById('ans').value.trim();
  if (!a) { alert('请输入答案'); return; }
  document.getElementById('btnSub').disabled = true;
  document.getElementById('btnSub').innerText = 'AI 评判中…';
  // v0.48.6: 给 /api/judge 加 30s timeout(LLM 调外部 API 偶尔慢,Bisen 反馈"卡死")
  //   AbortController 比 fetch 直接 timeout 更可靠 — 超时后取消请求,按钮立即恢复
  const judgeController = new AbortController();
  const judgeTimeout = setTimeout(() => judgeController.abort(), 30000);
  try {
    const jr = await fetch(API + '/judge', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ student_id: sid, problem_id: q.problem_id, student_answer: a }),
      signal: judgeController.signal,
    });
    clearTimeout(judgeTimeout);
    const jd = await jr.json();
    if (jd.error) { alert(jd.error); return; }
    const ok = jd.correct;
    const reasoning = jd.reasoning || '';

    const r = await fetch(API + '/answer', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ student_id: sid, problem_id: q.problem_id, skill_id: q.topic,
        correct: ok, bloom_layer: q.bloom_layer, explanation_text: a, reasoning: reasoning })
    });
    const d = await r.json();

    // v0.48.5: 检查持久化标志,save 失败时弹 alert (Bisen 反馈 7-19~7-21 期间 4 道题数据丢了)
    if (d.persisted === false) {
      alert('⚠️ 持久化失败!\n\n答题结果已更新 in-memory 状态,但保存到数据库失败(可能 Flask 进程需要重启)。\n刷新页面会丢失这题结果。\n\n建议: 重启 Flask 进程后再答题。');
    }

    document.getElementById('fbox').style.display = 'block';
    document.getElementById('fbres').className = 'fb ' + (ok ? 'ok' : 'err');
    document.getElementById('fbres').innerHTML = (ok ? '✅ 正确' : '❌ 错误') + `<div style="margin-top:4px;font-size:12px;color:#6b7280;">AI 评判：${reasoning}</div>`;
    let meta = `K=${d.theta.K}  P=${d.theta.P}  S=${d.theta.S}  C=${d.theta.C}  X=${d.theta.X}`;
    if (d.misc_triggered) meta += ` &nbsp;|&nbsp; ⚠️ ${d.misc_id} (${d.misc_confidence})`;
    document.getElementById('fbres').innerHTML += `<div class="meta">${meta}</div>`;
    if (d.misc_triggered) {
      const r2 = await fetch(API + '/intervention/' + sid, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ misc_id: d.misc_id, student_answer: a, problem_text: q.problem_text })
      });
      const d2 = await r2.json();
      if (d2.intervention) {
        document.getElementById('ivbox').style.display = 'block';
        document.getElementById('ivtype').innerHTML = `<span class="lbl">${d2.misc_id} ${d2.misc_name}</span> ${d2.type}`;
        document.getElementById('ivbd').innerText = d2.intervention;
      }
    }
    document.getElementById('btnSub').style.display = 'none';
    document.getElementById('btnNext').style.display = '';
    // v0.48.3: 答完题重置报告 loaded 标记,让 refresh 末尾的 renderReportCard 强制重画
    //   之前只加载一次,Bisen 反馈\"第 10 题后报告内容没变化\"
    const rb = document.getElementById('reportBody');
    if (rb) delete rb.dataset.loaded;
    await refresh();
  } catch(e) { alert(e.message); } finally {
    document.getElementById('btnSub').disabled = false;
    document.getElementById('btnSub').innerText = '提交答案';
  }
}

async function nextQ() {
  await refresh();
  await loadQ();
}

// 渲染 5D 维度（W4 升级：theta 数字保持清晰,只灰显"置信度"标签 + 信息量 tooltip）
function renderDims(d) {
  const mx = 2.0;
  let html = '';
  for (const dim of DIMS) {
    const v = parseFloat(d.theta[dim.k]) || 0;
    const conf = parseFloat(d.theta_confidence?.[dim.k]) || 0;
    const se = parseFloat(d.theta_se?.[dim.k]) || 1.0;
    // W4 核心改进：theta 数字始终清晰,只灰显"置信度"标签
    //   - conf < 0.5 → 灰显 conf label + tooltip 解释
    //   - conf < 0.5 + SE > 0.7 → tooltip 加"信息量严重不足"
    const isConfLow = conf < 0.5;
    const isHighSE = se > 0.7;
    const confClass = isConfLow ? 'is-warmup' : '';
    const confReason = isConfLow
      ? `${dim.label}:置信度仅 ${Math.round(conf*100)}%（SE=${se.toFixed(2)}）信息量${isHighSE ? '严重' : ''}不足,估计暂不可靠`
      : '';
    const pct = Math.min(100, Math.abs(v)/mx*100);
    const confPct = Math.min(100, conf*100);
    html += `<div class="dim">
      <div class="f-row dim-head">
        <span class="f-lbl">${dim.k}</span>
        <span class="f-name">${dim.label}</span>
      </div>
      <div class="theta">${Number(v).toFixed(2)}</div>
      <div class="bar"><div style="width:${pct}%;background:${dim.color}"></div></div>
      <div class="conf-label ${confClass}" title="${confReason}">置信度 ${Math.round(confPct)}%</div>
      <div class="conf-bar"><div style="width:${confPct}%"></div></div>
    </div>`;
  }
  document.getElementById('dimGrid').innerHTML = html;
}

// 渲染 Bloom L1-L6（W4 升级：未探测层用虚线 + 灰色 + 「—」）
function renderBloom(d) {
  document.getElementById('bdom').innerText = d.bloom_profile?.dominant || '—';
  const bl = d.bloom_profile?.bloom_levels || {};
  const labels = {L1:'记忆',L2:'理解',L3:'应用',L4:'分析',L5:'评价',L6:'创造'};
  let html = '';
  for (const lvl of ['L1','L2','L3','L4','L5','L6']) {
    const v = parseFloat(bl[lvl]) || 0;
    // 未探测判定：v 偏离默认 0.5 < 0.01（说明 update 几乎没碰过这层）
    const isProbed = Math.abs(v - 0.5) > 0.01;
    const pct = Math.round(v * 100);
    if (isProbed) {
      html += `<div class="br">
        <span class="b-lbl">${lvl}</span>
        <span class="b-name">${labels[lvl]}</span>
        <div class="fill"><div style="width:${pct}%"></div></div>
        <span class="pct">${pct}%</span>
      </div>`;
    } else {
      // 未探测层:虚线 + 灰色 + 显示「—」
      html += `<div class="br unprobed" title="${lvl} 尚未被题目探测到（默认 0.5）">
        <span class="b-lbl">${lvl}</span>
        <span class="b-name">${labels[lvl]}</span>
        <div class="fill"><div class="unprobed-bar"></div></div>
        <span class="pct">—</span>
      </div>`;
    }
  }
  document.getElementById('bloomRows').innerHTML = html;
}

// 渲染 TC states（W4 升级：progress 颜色分级 <0.3 灰 / 0.3-0.7 黄 / >0.7 绿）
function renderTC(d) {
  const tc = d.tc_states || [];
  if (tc.length === 0) {
    document.getElementById('tcRows').innerHTML = '<div style="font-size:11px;color:#9ca3af;padding:6px 10px;">暂无 TC 数据（答对高水平题触发）</div>';
    return;
  }
  let html = '';
  for (const t of tc) {
    const statusLabel = {pre_liminal:'前',liminal:'LIMINAL',post_liminal:'已跨越'}[t.status] || t.status;
    const statusClass = {pre_liminal:'pre',liminal:'liminal',post_liminal:'post'}[t.status] || 'pre';
    const pct = Math.round((t.progress || 0) * 100);
    // 颜色分级
    let progClass = 'tc-low';
    if (t.progress >= 0.7) progClass = 'tc-high';
    else if (t.progress >= 0.3) progClass = 'tc-mid';
    html += `<div class="tc-r">
      <span class="tc-id">${t.id}</span>
      <span class="tc-status ${statusClass}">${statusLabel}</span>
      <div class="tc-progress"><div class="${progClass}" style="width:${pct}%"></div></div>
      <span class="tc-pct">${pct}%</span>
    </div>`;
  }
  document.getElementById('tcRows').innerHTML = html;
}

// 渲染 LearningDNA
function renderLDN(d) {
  const ldn = d.learning_dna || {};
  document.getElementById('ldnRow').innerHTML = `
    <div><strong>输入偏好:</strong> ${ldn.input_preference || '—'}</div>
    <div><strong>反馈偏好:</strong> ${ldn.feedback_preference || '—'}</div>
  `;
}

// 渲染 Trajectory
function renderTraj(d) {
  const traj = d.trajectory || [];
  if (traj.length === 0) {
    document.getElementById('trajCard').style.display = 'none';
    return;
  }
  document.getElementById('trajCard').style.display = 'block';
  document.getElementById('trajN').innerText = traj.length;
  let html = '';
  // 反序，最近的在前
  for (let i = traj.length - 1; i >= 0; i--) {
    const t = traj[i];
    const theta = t.theta_5d || [];
    const ts = t.timestamp ? t.timestamp.substring(5,16) : `#${i+1}`;
    html += `<div class="traj-item">
      <span class="t-num">${ts}</span>
      <span class="t-k">K${theta[0]?.toFixed(2)||'—'}</span>
      <span class="t-p">P${theta[1]?.toFixed(2)||'—'}</span>
      <span class="t-s">S${theta[2]?.toFixed(2)||'—'}</span>
      <span style="margin-left:auto;font-size:10px;color:#9ca3af;">${t.bloom_dominant||''}</span>
    </div>`;
  }
  document.getElementById('trajList').innerHTML = html;
}

// 渲染 Misconceptions
function renderMisc(d) {
  const misc = d.misc_history || [];
  if (misc.length === 0) {
    document.getElementById('miscCard').style.display = 'none';
    return;
  }
  document.getElementById('miscCard').style.display = 'block';
  document.getElementById('miscN').innerText = misc.length;
  document.getElementById('miscList').innerHTML = misc.slice(-10).map(m =>
    `<span class="misc-badge">${m}</span>`
  ).join('');
}

async function refresh() {
  // v0.48.4: 重构 — fetch 阶段不 try/catch(让 promise 在 fetch 失败时 reject)
  //   之前 try/catch 包裹整个函数,fetch 失败被静默吞掉 → start() 以为成功了 → display:block
  //   但 d 是 undefined,5D/Bloom/TC 显示初始 innerText (k总置信度 0.000, Bloom: —)
  //   修法:fetch 阶段异常让它冒到外层,start() 看到 reject → 不 display study,提示用户
  let d;
  try {
    const r = await fetch(API + '/state/' + sid);
    if (!r.ok) {
      throw new Error(`/api/state HTTP ${r.status}`);
    }
    d = await r.json();
    if (d.error) {
      throw new Error('/api/state 返回 error: ' + d.error);
    }
  } catch (e) {
    // fetch 失败:让 promise reject,start() 收到后能正确处理
    throw new Error('state 加载失败: ' + e.message);
  }

  // 渲染阶段: 每个 render 用独立 try/catch,某个失败不影响其他
  try {
    // W1 (2026-07-17): Bloom 距下一层 Δ
    document.getElementById('kb').innerText = d.bloom_profile?.dominant || '—';
    const dist = d.bloom_layer_distance;
    const kdelta = document.getElementById('kdelta');
    if (dist && dist.next) {
      const gapVal = dist.gap || 0;
      const sign = gapVal > 0 ? '+' : '';
      const deltaClass = gapVal > 0.05 ? 'positive' : (gapVal < -0.05 ? 'negative' : '');
      kdelta.className = 'bloom-delta ' + deltaClass;
      kdelta.innerText = `→ ${dist.next} (${sign}${gapVal.toFixed(2)})`;
      kdelta.title = `当前 ${dist.current} 掌握 ${(dist.current_prob*100).toFixed(0)}%，${dist.next} 掌握 ${(dist.next_prob*100).toFixed(0)}%`;
      kdelta.style.display = '';
    } else if (dist && !dist.next) {
      kdelta.innerText = '🎯 已达顶层';
      kdelta.className = 'bloom-delta positive';
      kdelta.title = '已达到 Bloom 6 创造层';
      kdelta.style.display = '';
    } else {
      kdelta.style.display = 'none';
    }

    // W1 (2026-07-17): 总置信度(v0.48.8 移除了 C 折扣顶栏显示 — 移到 C 维度卡里单独看,本 commit 仅删顶栏)
    const isWarmup = !!d.is_warmup;
    const kovEl = document.getElementById('kov');
    kovEl.innerText = '总置信度: ' + (d.overall_confidence || 0).toFixed(3);
    kovEl.className = '';
    kovEl.title = (d.overall_confidence || 0) < 0.5
      ? `整体置信度仅 ${((d.overall_confidence || 0) * 100).toFixed(0)}%,需要更多题目收敛`
      : '';

    // W1 (2026-07-17): warm-up 状态机
    const prevWarmup = window._lastIsWarmup;
    window._lastIsWarmup = isWarmup;
    const wpill = document.getElementById('warmup-pill');
    if (isWarmup) {
      wpill.style.display = '';
      wpill.classList.remove('fadeout');
    } else {
      if (prevWarmup === true) {
        wpill.classList.add('fadeout');
        setTimeout(() => { wpill.style.display = 'none'; wpill.classList.remove('fadeout'); }, 350);
      } else {
        wpill.style.display = 'none';
      }
    }

    renderDims(d);
    renderBloom(d);
    renderTC(d);
    renderLDN(d);
    renderTraj(d);
    renderMisc(d);
    renderReportCard(d);  // W5+ (2026-07-19): 个人学习画像面板
  } catch(e) {
    // 渲染阶段失败:warn 但不 throw(部分渲染仍可工作)
    console.warn('refresh 渲染部分失败(d 已成功拿到):', e);
  }
}

// W5+ (2026-07-19): 个人学习画像面板——纯前端渲染后端 interpretation 字段
// v0.48.3: 加 force 参数,submit 答完题后强制重画（之前只加载一次,Bisen 反馈"第 10 题后内容没变"）
async function renderReportCard(stateData, force = false) {
  // 只在有答题数据后才显示（answered_count > 0）
  const answered = stateData?.summary?.answered_count
    || (stateData?.trajectory ? stateData.trajectory.length : 0)
    || 0;
  const card = document.getElementById('reportCard');
  if (answered < 1) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  document.getElementById('reportStamp').innerText = `${answered} 题后生成`;

  // 懒加载守卫:平时不重拉(避免 refresh 频繁触发),submit 后 force=true 重画
  const body = document.getElementById('reportBody');
  if (!force && body.dataset.loaded === '1') return;

  try {
    const r = await fetch(API + '/report/' + sid);
    if (!r.ok) {
      body.innerHTML = `<div class="report-loading">❌ 报告加载失败: HTTP ${r.status}</div>`;
      return;
    }
    const data = await r.json();
    if (data.error) {
      body.innerHTML = `<div class="report-loading">❌ 报告错误: ${data.error}</div>`;
      return;
    }
    body.innerHTML = renderInterpretationHTML(data.interpretation, data.ecos_version);
    body.dataset.loaded = '1';
  } catch(e) {
    body.innerHTML = `<div class="report-loading">❌ 报告加载异常: ${e.message}</div>`;
  }
}

function renderInterpretationHTML(interp, ecosVersion) {
  if (!interp || interp.error) {
    return `<div class="report-loading">⚠ 解读暂不可用: ${interp?.error || 'unknown'}</div>`;
  }
  const fiveD = interp.five_d || {};
  const bloom = interp.bloom || {};
  const tc = interp.tc || {};
  const traj = interp.trajectory || {};
  const steps = interp.next_steps || [];

  // 5D 维度顺序
  const dimOrder = ['K', 'P', 'S', 'C', 'X'];
  const fiveDRows = dimOrder
    .filter(d => fiveD[d])
    .map(d => {
      const v = fiveD[d];
      return `<div class="report-5d-row">
        <div class="report-5d-name">${d} ${esc(v.name || '')}</div>
        <div><span class="report-tag ${esc(v.level || 'medium')}">${esc(v.level_label || '')}</span></div>
        <div class="report-5d-comment">${esc(v.comment || '')}</div>
      </div>`;
    }).join('');

  // TC topic 列表
  const tcRows = (tc.topics || []).map(t => {
    const tagClass = t.tag === '接近 liminal' ? 'approaching'
      : t.tag === '进行中' ? 'progressing' : 'untouched';
    return `<div class="report-tc-row">
      <div class="report-tc-name">${esc(t.id)}</div>
      <div class="report-tc-prog">${(t.progress * 100).toFixed(0)}%</div>
      <div><span class="report-tag ${tagClass}">${esc(t.tag)}</span></div>
    </div>`;
  }).join('');

  // 轨迹 Δ5D 芯片
  const deltaChips = Object.entries(traj.delta_5d || {})
    .map(([dim, val]) => {
      const cls = val > 0.01 ? 'up' : val < -0.01 ? 'down' : '';
      const sign = val > 0 ? '+' : '';
      return `<span class="report-delta-chip ${cls}">${dim} ${sign}${val.toFixed(2)}</span>`;
    }).join('');

  // next_steps 列表
  const stepItems = steps.map(s => `<li>${esc(s)}</li>`).join('');

  return `
    <div class="report-section">
      <div class="report-section-title">📌 总评</div>
      <div class="report-overall">${esc(interp.overall || '')}</div>
    </div>

    <div class="report-section">
      <div class="report-section-title">📊 5D 维度解读</div>
      ${fiveDRows}
    </div>

    <div class="report-section">
      <div class="report-section-title">🎯 Bloom 认知深度</div>
      <div class="report-bloom-meta">
        主导层: <strong>${esc(bloom.dominant_label || bloom.dominant || '—')}</strong>
        ${bloom.next_layer ? `· 下一层 <strong>${esc(bloom.next_layer)}</strong> gap = <strong>${(bloom.gap_to_next || 0).toFixed(3)}</strong>` : ''}
        ${bloom.unprobed_layers && bloom.unprobed_layers.length ? `· 未探及: ${bloom.unprobed_layers.map(esc).join(', ')}` : ''}
      </div>
      <div class="report-comment">${esc(bloom.comment || '')}</div>
    </div>

    <div class="report-section">
      <div class="report-section-title">🧠 阈值概念 (TC)</div>
      <div class="report-comment">${esc(tc.comment || '')}</div>
      ${tcRows}
    </div>

    <div class="report-section">
      <div class="report-section-title">📈 成长轨迹</div>
      <div class="report-comment">${esc(traj.trend || '')}</div>
      <div class="report-traj-delta">${deltaChips}</div>
      <div class="report-comment">${esc(traj.comment || '')}</div>
    </div>

    <div class="report-section">
      <div class="report-section-title">💡 下一步建议</div>
      <ol class="report-steps">${stepItems}</ol>
    </div>

    <div class="report-comment" style="text-align:right; color:#9ca3af; font-size:10px; margin-top:8px;">
      ECOS v${esc(ecosVersion || '?')} · 规则引擎生成 · 无 LLM 调用
    </div>
  `;
}

function toggleReport() {
  const body = document.getElementById('reportBody');
  const btn = document.getElementById('reportToggle');
  if (body.style.display === 'none') {
    body.style.display = '';
    btn.innerText = '收起 ↑';
  } else {
    body.style.display = 'none';
    btn.innerText = '展开 ↓';
  }
}

// v0.49.0: 成长轨迹折叠切换(同 toggleReport 模式)
function toggleTraj() {
  const list = document.getElementById('trajList');
  const btn = document.getElementById('trajToggle');
  if (list.style.display === 'none') {
    list.style.display = '';
    btn.innerText = '收起 ↑';
  } else {
    list.style.display = 'none';
    btn.innerText = '展开 ↓';
  }
}

// 简单 HTML escape 工具（避免 interpretation 中的引号/尖括号被解释成 HTML）
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// W3+：导出学习报告（C 端接口）
async function exportReport() {
  const btn = document.getElementById('export-btn');
  const oldText = btn.innerText;
  btn.disabled = true;
  btn.innerText = '导出中…';
  try {
    const r = await fetch(API + '/report/' + sid);
    if (!r.ok) {
      alert('导出失败：HTTP ' + r.status);
      return;
    }
    const data = await r.json();
    // 触发下载 JSON 文件
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const today = new Date().toISOString().slice(0, 10);
    a.download = `ecos_report_${sid}_${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.innerText = '✅ 已导出';
    setTimeout(() => { btn.innerText = oldText; }, 1500);
  } catch(e) {
    alert('导出失败：' + e.message);
  } finally {
    btn.disabled = false;
  }
}
