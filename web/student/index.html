<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOS 学生端</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 学生 ID 输入区域 -->
        <section class="section student-id-section">
            <h2>登录</h2>
            <div class="form-group">
                <label for="student-id">学生 ID：</label>
                <input type="text" id="student-id" placeholder="请输入学生ID">
                <button id="btn-login">进入学习</button>
            </div>
        </section>

        <!-- 当前状态展示区域 -->
        <section class="section status-section" style="display: none;">
            <h2>学习状态</h2>

            <!-- BloomProfile 雷达图占位 -->
            <div class="bloom-profile-card">
                <h3>BloomProfile</h3>
                <div class="radar-placeholder">
                    <div class="placeholder-text">[BloomProfile 雷达图占位]</div>
                    <div class="placeholder-note">L1 Remember | L2 Understand | L3 Apply | L4 Analyze</div>
                </div>
                <div class="bloom-levels">
                    <div class="bloom-level">
                        <span class="level-label">L1</span>
                        <div class="level-bar"><div class="level-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="bloom-level">
                        <span class="level-label">L2</span>
                        <div class="level-bar"><div class="level-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="bloom-level">
                        <span class="level-label">L3</span>
                        <div class="level-bar"><div class="level-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="bloom-level">
                        <span class="level-label">L4</span>
                        <div class="level-bar"><div class="level-fill" style="width: 0%"></div></div>
                    </div>
                </div>
            </div>

            <!-- 5D 状态条形图占位 -->
            <div class="five-d-card">
                <h3>5D 学习状态</h3>
                <div class="bar-placeholder">
                    <div class="placeholder-text">[5D 状态条形图占位]</div>
                </div>
                <div class="five-d-bars">
                    <div class="five-d-item">
                        <span class="dim-label">K 知识</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="five-d-item">
                        <span class="dim-label">P 程序</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="five-d-item">
                        <span class="dim-label">S 策略</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="five-d-item">
                        <span class="dim-label">C 置信</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="five-d-item">
                        <span class="dim-label">X 支架</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: 0%"></div></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 题目展示区域 -->
        <section class="section problem-section" style="display: none;">
            <h2>当前题目</h2>
            <div class="problem-card">
                <div class="problem-text" id="problem-text">
                    [题目文本占位]
                </div>
                <div class="problem-options" id="problem-options">
                    <!-- 选择题选项占位 -->
                    <div class="option-item">A. [选项A]</div>
                    <div class="option-item">B. [选项B]</div>
                    <div class="option-item">C. [选项C]</div>
                    <div class="option-item">D. [选项D]</div>
                </div>
                <div class="problem-input">
                    <input type="text" id="answer-input" placeholder="输入你的答案">
                </div>
                <button id="btn-submit">提交答案</button>
            </div>
        </section>

        <!-- 干预展示区域 -->
        <section class="section intervention-section" style="display: none;">
            <h2>学习推荐</h2>
            <div class="intervention-card">
                <div class="intervention-type" id="intervention-type">
                    [干预类型占位]
                </div>
                <div class="intervention-content" id="intervention-content">
                    [干预内容占位]
                </div>
                <div class="intervention-rationale" id="intervention-rationale">
                    <strong>推荐理由：</strong>[LCA rationale 占位]
                </div>
            </div>
        </section>

        <!-- 解释文本输入区域（BeliefEngine.explanation_text） -->
        <section class="section explanation-section" style="display: none;">
            <h2>思路解释</h2>
            <div class="explanation-card">
                <p class="explanation-hint">请描述你的解题思路（用于认知状态分析）：</p>
                <textarea id="explanation-text" rows="4" placeholder="用你自己的话解释一下这道题是怎么做的..."></textarea>
                <button id="btn-submit-explanation">提交解释</button>
            </div>
        </section>
    </div>

    <script>
        // 骨架阶段：所有逻辑为占位符，不实现实际功能
        document.getElementById('btn-login')?.addEventListener('click', function() {
            const studentId = document.getElementById('student-id').value;
            if (studentId) {
                document.querySelector('.student-id-section').style.display = 'none';
                document.querySelector('.status-section').style.display = 'block';
                document.querySelector('.problem-section').style.display = 'block';
                document.querySelector('.explanation-section').style.display = 'block';
            }
        });

        document.getElementById('btn-submit')?.addEventListener('click', function() {
            document.querySelector('.intervention-section').style.display = 'block';
        });

        document.getElementById('btn-submit-explanation')?.addEventListener('click', function() {
            const text = document.getElementById('explanation-text').value;
            console.log('Explanation submitted:', text);
        });
    </script>
</body>
</html>
